<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>AI 공부 자세 분석</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

<style>

body{
margin:0;
font-family:sans-serif;
background:#f2f2f2;
text-align:center;
}

.header{
background:#4CAF50;
color:white;
padding:15px;
font-size:22px;
}

canvas{
width:100%;
max-width:600px;
max-height:55vh;
border:2px solid #ccc;
border-radius:10px;
}

.score{
font-size:26px;
margin-top:10px;
}

.grade{
font-size:24px;
margin-top:5px;
}

.message{
font-size:20px;
margin-top:10px;
}

.good{color:green;}
.bad{color:red;}

#chart{
width:100%;
max-width:600px;
height:120px;
border:1px solid #ccc;
margin-top:10px;
}

</style>

</head>

<body>

<div class="header">
AI 공부 자세 분석
</div>

<video id="video" autoplay playsinline style="display:none"></video> <canvas id="canvas"></canvas>

<div class="score" id="scoreText">
자세 점수: 100
</div>

<div class="grade" id="gradeText">
등급: A
</div>

<div class="message good" id="message">
좋은 자세입니다 🙂
</div>

<canvas id="chart"></canvas>

<script>

const video=document.getElementById("video")
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

const chart=document.getElementById("chart")
const chartCtx=chart.getContext("2d")

const scoreText=document.getElementById("scoreText")
const gradeText=document.getElementById("gradeText")
const message=document.getElementById("message")

let lastPoints={}
let scoreHistory=[]

async function setupCamera(){

try{

const stream=await navigator.mediaDevices.getUserMedia({
video:{
facingMode:"user",
width:{ideal:1280},
height:{ideal:720}
}
})

video.srcObject=stream
await video.play()

}catch(e){

alert("카메라 접근 실패")

}

}

function smooth(name,x,y){

if(!lastPoints[name]){
lastPoints[name]={x,y}
}

lastPoints[name].x=lastPoints[name].x*0.7+x*0.3
lastPoints[name].y=lastPoints[name].y*0.7+y*0.3

return lastPoints[name]

}

function drawChart(){

chart.width=canvas.width
chart.height=120

chartCtx.clearRect(0,0,chart.width,chart.height)

chartCtx.beginPath()

for(let i=0;i<scoreHistory.length;i++){

let x=i*10
let y=120-scoreHistory[i]

if(i===0){
chartCtx.moveTo(x,y)
}else{
chartCtx.lineTo(x,y)
}

}

chartCtx.stroke()

}

function getGrade(score){

if(score>=90) return "A"
if(score>=70) return "B"
if(score>=50) return "C"
return "D"

}

function drawArrow(x1,y1,x2,y2){

ctx.beginPath()
ctx.moveTo(x1,y1)
ctx.lineTo(x2,y2)
ctx.strokeStyle="yellow"
ctx.lineWidth=4
ctx.stroke()

}

async function detectPose(detector){

const poses=await detector.estimatePoses(video)

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0)

if(poses.length>0){

const keypoints=poses[0].keypoints

let nose,shoulder,hip

for(let kp of keypoints){

if(kp.score>0.4){

let p=smooth(kp.name,kp.x,kp.y)

ctx.beginPath()
ctx.arc(p.x,p.y,6,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

if(kp.name==="nose") nose=p
if(kp.name==="left_shoulder") shoulder=p
if(kp.name==="left_hip") hip=p

}

}

let score=100
let msg="좋은 자세입니다 🙂"
let bad=false

// 바른 자세 기준선
if(shoulder && hip){

ctx.beginPath()
ctx.moveTo(shoulder.x,shoulder.y)
ctx.lineTo(hip.x,hip.y)
ctx.strokeStyle="blue"
ctx.lineWidth=3
ctx.stroke()

}

// 거북목
if(nose && shoulder){

if(nose.x>shoulder.x+40){

score-=40
msg="목을 뒤로 당기세요"
bad=true

drawArrow(nose.x,nose.y,nose.x-60,nose.y)

}

}

// 허리
if(shoulder && hip){

let dx=Math.abs(shoulder.x-hip.x)

if(dx>40){

score-=30
msg="허리를 펴세요"
bad=true

drawArrow(shoulder.x,shoulder.y,shoulder.x,shoulder.y-60)

}

}

scoreText.innerText="자세 점수: "+score

let grade=getGrade(score)

gradeText.innerText="등급: "+grade

message.innerText=msg

if(bad){
message.className="message bad"
}else{
message.className="message good"
}

scoreHistory.push(score)

if(scoreHistory.length>40){
scoreHistory.shift()
}

drawChart()

}

requestAnimationFrame(()=>detectPose(detector))

}

async function start(){

await setupCamera()

const detector=await poseDetection.createDetector(
poseDetection.SupportedModels.MoveNet
)

detectPose(detector)

}

start()

</script>

</body>
</html>
