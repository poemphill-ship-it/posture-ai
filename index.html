<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

async function setupCamera(){

try{

const stream=await navigator.mediaDevices.getUserMedia({
video:{
facingMode:"user",
width:{ideal:1280},
height:{ideal:720}
}
})

video.srcObject=stream

await video.play()

}catch(e){

alert("카메라 접근 실패")

}

}

function smooth(name,x,y){

if(!lastPoints[name]){
lastPoints[name]={x,y}
}

lastPoints[name].x=lastPoints[name].x*0.7+x*0.3
lastPoints[name].y=lastPoints[name].y*0.7+y*0.3

return lastPoints[name]

}

function drawChart(){

chart.width=canvas.width
chart.height=120

chartCtx.clearRect(0,0,chart.width,chart.height)

chartCtx.beginPath()

for(let i=0;i<scoreHistory.length;i++){

let x=i*10
let y=120-scoreHistory[i]

if(i===0){
chartCtx.moveTo(x,y)
}else{
chartCtx.lineTo(x,y)
}

}

chartCtx.stroke()

}

if(kp.name==="left_hip") hip=p

}

}
