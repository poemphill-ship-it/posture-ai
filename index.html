<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI 자세 교정</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

<style>

body{
margin:0;
background:#f2f2f2;
font-family:sans-serif;
text-align:center;
}

.header{
background:#4CAF50;
color:white;
padding:15px;
font-size:20px;
}

canvas{
width:100%;
max-width:600px;
border-radius:10px;
border:2px solid #ddd;
}

.score{
font-size:26px;
margin-top:10px;
}

.message{
font-size:20px;
margin-top:10px;
}

.good{color:green;}
.bad{color:red;}

</style>
</head>

<body>

<div class="header">
AI 공부 자세 교정
</div>

<video id="video" autoplay playsinline style="display:none"></video>
<canvas id="canvas"></canvas>

<div class="score" id="scoreText">
자세 점수: 100
</div>

<div class="message good" id="message">
좋은 자세입니다 🙂
</div>

<script>

const video=document.getElementById("video")
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

const scoreText=document.getElementById("scoreText")
const message=document.getElementById("message")

// 점 흔들림 줄이기용
let lastPoints={}

async function setupCamera(){

const stream=await navigator.mediaDevices.getUserMedia({
video:{
facingMode:"user",
width:{ideal:1280},
height:{ideal:720}
}
})

video.srcObject=stream

return new Promise(resolve=>{
video.onloadedmetadata=()=>{
video.play()
resolve()
}
})

}

async function start(){

await setupCamera()

const detector=await poseDetection.createDetector(
poseDetection.SupportedModels.MoveNet
)

detectPose(detector)

}

function smoothPoint(name,x,y){

if(!lastPoints[name]){
lastPoints[name]={x,y}
}

lastPoints[name].x=lastPoints[name].x*0.7+x*0.3
lastPoints[name].y=lastPoints[name].y*0.7+y*0.3

return lastPoints[name]

}

async function detectPose(detector){

const poses=await detector.estimatePoses(video)

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0,canvas.width,canvas.height)

if(poses.length>0){

const keypoints=poses[0].keypoints

let score=100
let msg="좋은 자세입니다 🙂"
let bad=false

let nose,leftShoulder,rightShoulder,leftHip

for(let kp of keypoints){

if(kp.score>0.4){

let p=smoothPoint(kp.name,kp.x,kp.y)

ctx.beginPath()
ctx.arc(p.x,p.y,6,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

if(kp.name==="nose") nose=p
if(kp.name==="left_shoulder") leftShoulder=p
if(kp.name==="right_shoulder") rightShoulder=p
if(kp.name==="left_hip") leftHip=p

}

}

// 어깨 기울기
if(leftShoulder && rightShoulder){

let dy=leftShoulder.y-rightShoulder.y

if(Math.abs(dy)>20){
score-=20
msg="어깨 균형을 맞추세요"
bad=true
}

}

// 거북목
if(nose && leftShoulder && rightShoulder){

let shoulderX=(leftShoulder.x+rightShoulder.x)/2

if(nose.x>shoulderX+40){
score-=30
msg="목을 뒤로 당기세요"
bad=true
}

}

// 허리
if(leftShoulder && leftHip){

let dy=leftHip.y-leftShoulder.y

if(dy<100){
score-=30
msg="허리를 펴세요"
bad=true
}

}

scoreText.innerText="자세 점수: "+score
message.innerText=msg

if(bad){
message.className="message bad"
}else{
message.className="message good"
}

}

requestAnimationFrame(()=>detectPose(detector))

}

start()

</script>

</body>
</html>
